<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn.jsdelivr.net/gh/ismanus/manus@main/ImageTrail/icon-favicon.png" type="image/png">
  <title>不正经制造 - HANDY</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'PingFang SC', 'sans-serif';
      -webkit-font-smoothing: antialiased;
    }
    /* 针对详情页正文的排版优化 */
    .project-content p {
      color: #9ca3af; /* text-gray-400 */
      line-height: 1.8;
      font-size: 16px;
      max-width: 800px;
    }
  </style>
</head>
<body class="bg-white text-black">

  <a href="javascript:history.back()" class="fixed top-8 right-8 md:top-12 md:right-12 z-50 group">
    <div class="w-10 h-10 md:w-12 md:h-12 bg-black rounded-full flex items-center justify-center transition-transform group-hover:scale-110 active:scale-95">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>
  </a>

  <main class="max-w-[1440px] mx-auto px-6 md:px-24 pt-24 pb-32">
    
    <header class="mb-16">
      <div class="w-[70px] h-[70px] bg-[#ffffff] mb-8 overflow-hidden">
        <img src="https://cdn.jsdelivr.net/gh/ismanus/manus@main/project-wss/wss-logo.png" alt="App Icon" class="w-full h-full object-cover">
      </div>

      <h1 class="text-4xl md:text-5xl font-bold mb-2">不正经制造</h1>
      <p class="text-gray-900 font-medium mb-8">2023</p>

      <div class="project-content mb-10">
        <p>
        客户公司广告部门业务订单日益增多，为了满足向外部进行项目宣传与服务介绍的功能，立项为广告部门设计开发门户官网“不正经制造”。
        官网需满足：历史项目展示、团队介绍、客户咨询和订单下单4大主要功能。
        设计风格确定为以橙、蓝为主色调的卡通涂鸦风，以契合不正经制造厂牌年轻、潮流的品牌调性，交互设计以互动游戏为主，更吸引点击。
        </p>
      </div>

      <div class="flex flex-wrap gap-3">
        <span class="bg-[#f2f2f2] px-4 py-1.5 rounded-full text-sm font-medium">Web</span>
        <span class="bg-[#f2f2f2] px-4 py-1.5 rounded-full text-sm font-medium">UIUX</span>
        <span class="bg-[#f2f2f2] px-4 py-1.5 rounded-full text-sm font-medium">企业官网</span>
      </div>
    </header>

    <div class="space-y-0">
      
      <div class="w-full aspect-video bg-[#00AAFF] overflow-hidden">
        <img src="https://cdn.jsdelivr.net/gh/ismanus/manus@main/project-wss/wss-1.png" alt="Project Detail 1" class="w-full h-full object-cover">
      </div>

      <div class="w-full aspect-video bg-[#00AAFF] overflow-hidden">
        <img src="https://cdn.jsdelivr.net/gh/ismanus/manus@main/project-wss/wss-2.png" alt="Project Detail 1" class="w-full h-full object-cover">
      </div>

      <div class="w-full aspect-video bg-[#00AAFF] overflow-hidden">
        <img src="https://cdn.jsdelivr.net/gh/ismanus/manus@main/project-wss/wss-3.png" alt="Project Detail 1" class="w-full h-full object-cover">
      </div>

      <div class="w-full aspect-video bg-[#00AAFF] overflow-hidden">
        <img src="https://cdn.jsdelivr.net/gh/ismanus/manus@main/project-wss/wss-4.png" alt="Project Detail 1" class="w-full h-full object-cover">
      </div>

      <div class="w-full aspect-video bg-[#00AAFF] overflow-hidden">
        <img src="https://cdn.jsdelivr.net/gh/ismanus/manus@main/project-wss/wss-5.png" alt="Project Detail 1" class="w-full h-full object-cover">
      </div>


  </main>

  <footer class="py-12 flex flex-col items-center border-t border-gray-100 mt-24">
    <div class="text-gray-400 text-xs tracking-widest uppercase mb-4">
      © 2026 Handy Liu • Project Case
    </div>
  </footer>

</body>
</html>
